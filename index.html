<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Forecast Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
padding:20px;
}

.container{
width:100%;
max-width:550px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
color:white;
}

.logo{
text-align:center;
font-size:30px;
font-weight:700;
margin-bottom:25px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:25px;
}

.search-box input{
flex:1;
padding:15px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,0.15);
color:white;
}

.search-box input::placeholder{
color:#ddd;
}

.search-box button{
padding:15px 25px;
border:none;
cursor:pointer;
border-radius:12px;
font-weight:600;
background:#38bdf8;
color:white;
transition:.3s;
}

.search-box button:hover{
background:#0ea5e9;
}

.weather{
display:none;
text-align:center;
}

.weather img{
width:100px;
margin-bottom:10px;
}

.city{
font-size:30px;
font-weight:600;
}

.temp{
font-size:55px;
font-weight:700;
margin-top:10px;
}

.condition{
font-size:20px;
margin-bottom:25px;
color:#ddd;
}

.details{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:rgba(255,255,255,0.08);
padding:18px;
border-radius:15px;
}

.card h4{
font-size:14px;
color:#ddd;
margin-bottom:8px;
}

.card p{
font-size:20px;
font-weight:600;
}

.loading{
display:none;
text-align:center;
font-size:18px;
}

.error{
display:none;
text-align:center;
color:#ff6b6b;
margin-top:15px;
}

@media(max-width:600px){

.temp{
font-size:42px;
}

.city{
font-size:24px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="logo">
🌦 Weather Forecast Pro
</div>

<div class="search-box">
<input type="text" id="cityInput" placeholder="Enter City Name">
<button onclick="getWeather()">Search</button>
</div>

<div class="loading" id="loading">
Loading Weather...
</div>

<div class="error" id="error">
City not found
</div>

<div class="weather" id="weather">

<img id="icon">

<div class="city" id="city"></div>

<div class="temp" id="temp"></div>

<div class="condition" id="condition"></div>

<div class="details">

<div class="card">
<h4>Humidity</h4>
<p id="humidity"></p>
</div>

<div class="card">
<h4>Wind Speed</h4>
<p id="wind"></p>
</div>

<div class="card">
<h4>Pressure</h4>
<p id="pressure"></p>
</div>

<div class="card">
<h4>Air Quality</h4>
<p id="air"></p>
</div>

</div>

</div>

</div>

<script>

const API_KEY = "de2b6f9fff174927acf154246263105";

async function getWeather(){

const city = document.getElementById("cityInput").value;

if(city==="") return;

document.getElementById("loading").style.display="block";
document.getElementById("weather").style.display="none";
document.getElementById("error").style.display="none";

try{

const response = await fetch(
`https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${city}&aqi=yes`
);

const data = await response.json();

if(data.error){
throw new Error();
}

document.getElementById("city").innerText =
`${data.location.name}, ${data.location.country}`;

document.getElementById("temp").innerText =
`${data.current.temp_c}°C`;

document.getElementById("condition").innerText =
data.current.condition.text;

document.getElementById("humidity").innerText =
`${data.current.humidity}%`;

document.getElementById("wind").innerText =
`${data.current.wind_kph} km/h`;

document.getElementById("pressure").innerText =
`${data.current.pressure_mb} mb`;

document.getElementById("air").innerText =
data.current.air_quality?.["us-epa-index"] || "N/A";

document.getElementById("icon").src =
"https:" + data.current.condition.icon;

document.getElementById("weather").style.display="block";

}catch{

document.getElementById("error").style.display="block";

}

document.getElementById("loading").style.display="none";

}

getWeatherDefault();

async function getWeatherDefault(){

document.getElementById("cityInput").value="Karachi";
getWeather();

}

</script>

</body>
</html>
